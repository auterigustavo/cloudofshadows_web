<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cloud of shadows</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body class="bg-black text-white font-[Oswald] scroll-smooth">

    <!-- Fondo -->
    <div class="fixed inset-0 -z-10 bg-[url('images/background.png')] bg-cover bg-center opacity-20"></div>

    <header
        class="sticky top-0 z-50 relative flex items-center p-4 bg-black/30 backdrop-blur-md border-b border-white/10"
        id="header">

        <!-- Boton -->
        <button id="menuBtn" class="text-2xl z-10">
            ☰
        </button>

        <!-- Logo -->
        <div class="absolute left-1/2 -translate-x-1/2">
            <a href="#inicio">
                <img src="images/cloudpng-white.png" alt="" class="w-40 h-20 object-contain">
            </a>
        </div>

        <!-- Menú oculto -->
        <div id="menu"
            class="hidden absolute top-full left-0 w-full bg-black/90 backdrop-blur-md flex flex-col items-center gap-4 py-4">
            <a href="#inicio">Inicio</a>
            <a href="#remeras">Remeras</a>
            <a href="#shows">Proximos shows</a>
            <a href="#discografia">Discografia</a>
        </div>

    </header>

    <section class="p-4" id="inicio">
        <div class="bg-gray-800/20 p-4 rounded-xl">

            <!-- Swiper -->
            <div class="swiper mySwiper rounded-2xl overflow-hidden">

                <div class="swiper-wrapper">

                    <div class="swiper-slide flex flex-col items-center">
                        <img src="images/en-vivo/Cloud of Shadows Club Re-8.jpg"
                            class="w-3/4 object-cover rounded-xl opacity-75" />
                    </div>

                    <div class="swiper-slide flex flex-col items-center">
                        <img src="images/en-vivo/Cloud of Shadows Club Re-21.jpg"
                            class="w-3/4 object-cover rounded-xl opacity-75" />
                    </div>

                    <div class="swiper-slide flex flex-col items-center">
                        <img src="images/en-vivo/cloud1.jpg" class="w-3/4 object-cover rounded-xl opacity-75" />
                    </div>

                </div>

                <!-- Flechas -->
                <div class="swiper-button-next text-white"></div>
                <div class="swiper-button-prev text-white"></div>

            </div>

        </div>
    </section>

    <section class="p-4 space-y-6" id="remeras">

        <section class="p-4 flex flex-col items-center">
            <h2 class="text-2xl mb-4 text-center">REMERAS</h2>

            <div class="flex flex-col items-center gap-4">
                <!--si quiero columnas para mas productos "grid grid-cols-2"-->

                <div class="bg-gray-800/20 p-4 rounded-xl flex flex-col items-center">
                    <img src="images/remeras/remera-el-arbol.jpeg" class="w-3/4 inline-2xs rounded mb-2" />
                    <p>Remera "El arbol de la muerte"</p>
                    <p class="text-green-400">$30.000</p>
                    <a href="#" id="btnComprar"
                        class="inline-block mt-4 bg-red-600 px-4 py-2 rounded hover:bg-red-500 transition">
                        Comprar
                    </a>
                </div>

            </div>
        </section>
    </section>

    <section class="p-4 text-center" id="shows">
        <h2 class="text-2xl mb-4">PRÓXIMOS SHOWS</h2>

        <div class="bg-gray-800/20 p-6 rounded-xl flex flex-col items-center">
            <img src="images/fecha-01052026.jpeg" class="w-1/2 inline-2xs rounded mb-2" />
            <p>01 de Mayo - Teatro Flores</p>
            <a href="#" id="btnComprar2"
                class="inline-block mt-4 bg-red-600 px-4 py-2 rounded hover:bg-red-500 transition">
                Comprar entrada
            </a>
        </div>
    </section>

    <section class="p-4 text-center" id="discografia">
        <h2 class="text-2xl mb-4">DISCOGRAFÍA</h2>

        <div class="bg-gray-800/20 p-4 rounded-xl flex flex-col items-center">

            <div class="grid grid-cols-3 gap-4 place-items-center">
                <a
                    href="https://music.youtube.com/playlist?list=OLAK5uy_naeFLlKODeH3WpT5Po6e_kkx5yJ2SxacM&si=W1EZVqd4o6OqhlXW">
                    <img src="images/album/the-skies-are-screaming.avif" alt="_blank"
                        class="w-24 rounded mb-2 hover:scale-105 transition">
                </a>
                <a
                    href="https://music.youtube.com/playlist?list=OLAK5uy_kqvjRHY4jqQ0MojgJwC61sdR69ZITfNXY&si=Ehdkt7Mplh0M6VVv">
                    <img src="images/album/beyond-the-physical.avif" alt="_blank"
                        class="w-24 rounded mb-2 hover:scale-105 transition">
                </a>
                <a
                    href="https://music.youtube.com/playlist?list=OLAK5uy_nHc8Vf0Ki8nKe99qnKcdqghZL_eEhjFxY&si=rv99kEL-FQoV38CZ">
                    <img src="images/album/rodeando-el-abismo.avif" alt="_blank"
                        class="w-24 rounded mb-2 hover:scale-105 transition">
                </a>
            </div>
            <p class="mb-2">Último lanzamiento</p>

            <iframe class="w-3/4 aspect-video rounded shadow-lg"
                src="https://www.youtube.com/embed/5DFYQiTecUY?si=5zBwoiYtyXQLJRPE" title="YouTube video player"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
    </section>

    <!--modal compra remeras-->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">

        <div class="bg-black/70 p-6 rounded-xl w-11/12 max-w-md">

            <h2 class="text-xl mb-4 text-center">Realizar pedido</h2>

            <!-- Formulario -->
            <div class="flex flex-col gap-3">

                <input id="cantidad" type="number" min="1" max="10" placeholder="Cantidad"
                    class="p-2 rounded bg-gray-800">

                <select id="talle" class="p-2 rounded bg-gray-800">
                    <option value="" disabled selected hidden>Talle</option>
                    <option>S</option>
                    <option>M</option>
                    <option>L</option>
                    <option>XL</option>
                </select>

                <select id="envio" class="p-2 rounded bg-gray-800">
                    <option value="" disabled selected hidden>Tipo de envío</option>
                    <option>Retiro en persona</option>
                    <option>Envío a domicilio</option>
                    <option>Coordinar con el vendedor</option>
                </select>

                <select id="pago" class="p-2 rounded bg-gray-800">
                    <option value="" disabled selected hidden>Medio de pago</option>
                    <option>Efectivo</option>
                    <option>Transferencia</option>
                </select>

                <!-- Botón enviar -->
                <button id="enviarPedido" class="bg-green-600 py-2 rounded hover:bg-green-500 transition">
                    Realizar pedido
                </button>

                <!-- Cerrar -->
                <button id="cerrarModal" class="text-gray-400 mt-2">
                    Cancelar
                </button>

            </div>

        </div>
    </div>

    <!--modal compra de entradas-->
    <div id="modal2" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">

        <div class="bg-black/70 p-6 rounded-xl w-11/12 max-w-md">

            <!-- Formulario -->

                    <option value="" disabled selected hidden>Seleccionar evento</option>

                <select id="envio2" class="p-2 rounded bg-gray-800">
                    <option value="" disabled selected hidden>Tipo de envío</option>
                    <option>Retiro en persona</option>
                    <option>Coordinar con el vendedor</option>
                </select>

                <select id="pago2" class="p-2 rounded bg-gray-800">
                    <option value="" disabled selected hidden>Medio de pago</option>

                    <option>Transferencia</option>
                </select>

                <!-- Botón enviar -->
                <button id="enviarPedido2" class="bg-green-600 py-2 rounded hover:bg-green-500 transition">

                </button>

                <!-- Cerrar -->
                <button id="cerrarModal2" class="text-gray-400 mt-2">
                    Cancelar
                </button>

            </div>

        </div>
    </div>
